services:
  # The Python Web Engine & ML Pipeline
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: intelligent-backend
    ports:
      - "8000:8000"
    environment:
      - NEWS_API_KEY=${NEWS_API_KEY}
    # Mounts the disk to save ML datasets dynamically
    volumes:
      - .:/app

  # The React Vite UI GUI
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: intelligent-frontend
    ports:
      # Maps production Nginx standard port 80 out to 5173 natively
      - "5173:80"
    depends_on:
      - backend
